<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>ArtistLog — Conecte Artistas e Contratantes para Eventos</title>
    <meta name="description" content="ArtistLog é a plataforma que conecta artistas e contratantes de eventos no Brasil. Encontre músicos, DJs, bandas e casas de shows. Agende, negocie e contrate de forma rápida e segura." />
    <meta name="keywords" content="artistas, músicos, bandas, DJs, contratantes, casas de shows, eventos, shows ao vivo, agenda de shows, contratar artista, plataforma de eventos, ArtistLog" />
    <meta name="author" content="ArtistLog" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Canonical -->
    <link rel="canonical" href="https://artistlog.com.br/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://artistlog.com.br/" />
    <meta property="og:site_name" content="ArtistLog" />
    <meta property="og:title" content="ArtistLog — Conecte Artistas e Contratantes para Eventos" />
    <meta property="og:description" content="Encontre e contrate artistas para seu evento, ou divulgue seu trabalho como músico. Plataforma completa com agenda, propostas e avaliações." />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ArtistLog — Conecte Artistas e Contratantes" />
    <meta name="twitter:description" content="A plataforma que conecta artistas e contratantes de eventos no Brasil. Agende, negocie e contrate com segurança." />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ArtistLog",
      "url": "https://artistlog.com.br",
      "description": "Plataforma que conecta artistas e contratantes de eventos no Brasil.",
      "applicationCategory": "EntertainmentApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "BRL"
      },
      "author": {
        "@type": "Organization",
        "name": "ArtistLog"
      }
    }
    </script>

    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://artistlog-backend-latest.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://artistlog-backend-latest.onrender.com" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
